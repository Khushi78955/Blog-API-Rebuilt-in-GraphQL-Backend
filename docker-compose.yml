services:
  postgres:
    image: postgres:17-alpine
    container_name: blog_graphql_postgres

    restart: unless-stopped

    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}

    ports:
      - "5433:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .

    container_name: blog_graphql_api

    restart: unless-stopped

    depends_on:
      postgres:
        condition: service_healthy

    ports:
      - "4000:4000"

    env_file:
      - .env

    volumes:
      - .:/app
      - /app/node_modules

    command: npm run dev

volumes:
  postgres_data: