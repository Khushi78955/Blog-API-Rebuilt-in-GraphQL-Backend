services:
  api:
    build: .

    container_name: blog_graphql_api

    restart: unless-stopped

    ports:
      - "4000:4000"

    env_file:
      - .env

    extra_hosts:
      - "host.docker.internal:host-gateway"

    environment:
      DB_HOST: host.docker.internal

    volumes:
      - .:/app
      - /app/node_modules

    command: npm run dev